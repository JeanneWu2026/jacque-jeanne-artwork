const tagConfig = {
  "书法与山水画": { cls: "tag-calligraphy", icon: "🏔️" },
  "油画": { cls: "tag-oil", icon: "🖼️" },
  "AI画": { cls: "tag-ai", icon: "✨" },
};

let currentCategory = "全部";
let currentSearch = "";

function renderGallery() {
  const grid = document.getElementById("galleryGrid");
  const noResults = document.getElementById("noResults");
  const galleryCount = document.getElementById("galleryCount");
  const galleryTitle = document.getElementById("galleryTitle");
  const statsText = document.getElementById("statsText");

  const filtered = artworks.filter(a => {
    const matchCat = currentCategory === "全部" || a.category === currentCategory;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || a.title.toLowerCase().includes(q) || a.artist.toLowerCase().includes(q) || a.category.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  grid.innerHTML = "";
  filtered.forEach((a, i) => {
    const tag = tagConfig[a.category];
    const card = document.createElement("div");
    card.className = "artwork-card";
    card.innerHTML = `
      <div class="artwork-img-wrap">
        <img src="${a.src}" alt="${a.title}" loading="lazy" />
      </div>
      <div class="artwork-info">
        <div class="artwork-title">${a.title}</div>
        <div class="artwork-artist">${a.artist}</div>
        <span class="artwork-tag ${tag.cls}">${tag.icon} ${a.category}</span>
      </div>
    `;
    card.onclick = () => openModal(a);
    grid.appendChild(card);
  });

  const count = filtered.length;
  galleryCount.textContent = `${count} 幅`;
  galleryTitle.textContent = currentCategory === "全部" ? "全部习作" : currentCategory;
  statsText.textContent = `共 ${count} 幅习作`;
  noResults.classList.toggle("show", count === 0);
}

function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll(".sidebar-item").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderGallery();
}

function filterArtworks() {
  currentSearch = document.getElementById("searchInput").value;
  renderGallery();
}

function openModal(artwork) {
  document.getElementById("modalImg").src = artwork.src;
  document.getElementById("modalImg").alt = artwork.title;
  document.getElementById("modalTitle").textContent = artwork.title;
  document.getElementById("modalArtist").textContent = artwork.artist;
  const tag = tagConfig[artwork.category];
  document.getElementById("modalTag").innerHTML = `<span class="artwork-tag ${tag.cls}">${tag.icon} ${artwork.category}</span>`;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e.target === document.getElementById("modalOverlay")) {
    closeModalBtn();
  }
}

function closeModalBtn() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModalBtn();
});

// Init
renderGallery();
</script>
</body>
</html>
